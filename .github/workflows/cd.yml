name: CD

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Deploy git ref (branch/tag/commit)"
        required: true
        default: "main"
      app_dir:
        description: "Target app directory on server"
        required: true
        default: "/home/ubuntu/Server/plma_backend_using_nestjs"
      process_name:
        description: "PM2 process name"
        required: true
        default: "newplma_v25"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Prepare artifact
        run: |
          mkdir -p deploy_bundle
          cp -r dist deploy_bundle/
          cp package.json pnpm-lock.yaml deploy_bundle/
          cp -r prisma deploy_bundle/
          tar -czf deploy_bundle.tar.gz -C deploy_bundle .

      - name: Upload artifact to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: "deploy_bundle.tar.gz"
          target: ${{ inputs.app_dir }}/releases/${{ github.run_number }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            RELEASE_DIR="${{ inputs.app_dir }}/releases/${{ github.run_number }}"
            CURRENT_LINK="${{ inputs.app_dir }}/current"

            mkdir -p "${{ inputs.app_dir }}/releases"
            cd "$RELEASE_DIR"
            tar -xzf deploy_bundle.tar.gz
            rm -f deploy_bundle.tar.gz

            corepack enable
            pnpm install --prod --frozen-lockfile

            ln -sfn "$RELEASE_DIR" "$CURRENT_LINK"
            cd "$CURRENT_LINK"

            if command -v pm2 >/dev/null 2>&1; then
              if pm2 describe "${{ inputs.process_name }}" >/dev/null 2>&1; then
                pm2 delete "${{ inputs.process_name }}"
              fi
              pm2 start dist/main.js --name "${{ inputs.process_name }}" --cwd "$CURRENT_LINK" --update-env
              pm2 save
            else
              echo "pm2 is not installed on server. Install pm2 or replace restart command in workflow."
              exit 1
            fi
