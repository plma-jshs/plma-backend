name: Deploy NestJS to Lightsail

on:
  push:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  APP_DIR: "/home/ubuntu/Server/plma_backend_using_nestjs"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js with Caching
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm" # ⚡ pnpm 의존성 캐싱 추가

      - name: Install dependencies
        run: pnpm install --frozen-lockfile # 🔒 락파일 기반 설치

      - name: Build & Test
        run: |
          pnpm run build
          pnpm test
          pnpm test:e2e

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p 9988 ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Create .env in CI
        run: |
          echo "PORT=${{ secrets.PORT }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" >> .env
          echo "CORS_ORIGINS=${{ secrets.CORS_ORIGINS }}" >> .env
          echo "IAM_CHECK_SESSION_URL=${{ secrets.IAM_CHECK_SESSION_URL }}" >> .env

      - name: Deploy to Server
        env:
          SERVER: ${{ secrets.SSH_HOST_USER }}@${{ secrets.SSH_HOST }}
        run: |
          # 1. dist 폴더를 임시 폴더로 전송 (덮어쓰기 방지)
          rsync -avz -e "ssh -p 9988" ./dist ./package.json ./pnpm-lock.yaml ./.env $SERVER:$APP_DIR/new_dist/

          # 2. 서버 내에서 아토믹하게 교체 및 재시작
          ssh -p 9988 $SERVER "
            set -e
            cd $APP_DIR
            # 기존 dist 백업 및 신규 dist 교체
            rm -rf dist_old && mv dist dist_old || true
            mv new_dist/dist dist
            cp new_dist/package.json new_dist/pnpm-lock.yaml new_dist/.env .
            rm -rf new_dist

            # Node.js 경로를 더 유연하게 찾기 (NVM 환경 대응)
            export NVM_DIR=\"\$HOME/.nvm\"
            [ -s \"\$NVM_DIR/nvm.sh\" ] && \. \"\$NVM_DIR/nvm.sh\"

            corepack enable
            
            pnpm install --prod
            pm2 restart plma-backend || pm2 start dist/src/main.js --name plma-backend
          "
